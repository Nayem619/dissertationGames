# Render: static web export for Expo (not `node expo-router/entry`).
# https://render.com/docs/static-sites
#
# In the Render dashboard you can instead create a Static Site manually with:
#   Build command:  npm install && npm run export:web
#   Publish directory: dist
#
# Set EXPO_PUBLIC_* env vars on Render before deploy — they are baked in at build time.

services:
  - type: web
    name: dissertationgames-web
    runtime: static
    buildCommand: npm install && npm run export:web
    staticPublishPath: dist
