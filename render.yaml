# Render deploy — IMPORTANT
# ----------------------------
# Troubleshooting: https://render.com/docs/troubleshooting-deploys
#
# If you use "Native Node" (no Docker): Dashboard → Settings → Start Command MUST be exactly:
#   node scripts/render-serve.js
#
# Leaving it blank sometimes makes Render run `node expo-router/entry` as if `main`
# were a file path → MODULE_NOT_FOUND. Your real Expo main is resolved via node_modules.
#
# This blueprint uses Docker so CMD in Dockerfile owns startup (always correct).

services:
  - type: web
    name: dissertationgames-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      # Needed by scripts/render-postinstall.js only during native npm installs (optional in Docker).
      - key: RENDER
        value: "true"
      - key: EXPO_PUBLIC_WEB_APP_URL
        value: "https://dissertationgames.onrender.com"
      - key: EXPO_PUBLIC_FIREBASE_API_KEY
        sync: false
      - key: EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: EXPO_PUBLIC_FIREBASE_PROJECT_ID
        sync: false
      - key: EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: EXPO_PUBLIC_FIREBASE_APP_ID
        sync: false
      - key: EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID
        sync: false
      - key: EXPO_PUBLIC_OPENAI_API_KEY
        sync: false
      - key: EXPO_PUBLIC_OPENAI_BASE_URL
        sync: false
      - key: EXPO_PUBLIC_OPENAI_MODEL
        sync: false
      - key: EXPO_PUBLIC_TRIVIA_GENERATE_URL
        sync: false

  - type: web
    name: dissertationgames-ludo
    runtime: docker
    dockerfilePath: ./vendor/mern-ludo/Dockerfile
    dockerContext: ./vendor/mern-ludo
    envVars:
      - key: NODE_ENV
        value: production
      # Include every origin that opens this app in a browser/WebView player.
      - key: CORS_ORIGINS
        value: https://dissertationgames-ludo.onrender.com,https://dissertationgames.onrender.com,http://localhost:3000
      # Atlas (or other) Mongo URI — mandatory. Allow 0.0.0.0/0 inbound on Atlas for Render’s IPs or use VPC.
      - key: CONNECTION_URI
        sync: false
      - key: SESSION_SECRET
        generateValue: true
